<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Usage Monitor</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="header-main">
          <h1>AI Usage Monitor</h1>
          <section class="actions">
            <button id="refreshNow" type="button">更新</button>
            <button id="togglePause" type="button" class="warn">停止</button>
            <button id="openOptions" type="button" class="secondary">設定</button>
          </section>
        </div>
        <p id="updatedAt">最終更新: --</p>
        <p id="modeState" class="mode-state">状態: --</p>
      </header>

      <section>
        <div id="status" class="status"></div>
        <div id="providers" class="providers"></div>
      </section>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
