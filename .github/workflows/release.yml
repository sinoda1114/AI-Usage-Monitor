name: Release Chrome Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read extension version
        id: version
        run: |
          EXT_VERSION=$(node -p "require('./manifest.json').version")
          echo "value=${EXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build extension zip
        run: |
          python3 scripts/package-store-zip.py
          mkdir -p dist
          cp "releases/ai-usage-monitor-store-v${{ steps.version.outputs.value }}.zip" \
            "dist/ai-usage-monitor-v${{ steps.version.outputs.value }}.zip"

      - name: Create GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ai-usage-monitor-v${{ steps.version.outputs.value }}.zip
          generate_release_notes: true
