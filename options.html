<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Usage Monitor Settings</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #11120f;
        color: #f3f0e8;
      }

      body {
        margin: 0;
        padding: 28px;
      }

      main {
        max-width: 680px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        color: #b8b09f;
        line-height: 1.6;
      }

      label {
        display: block;
        margin-top: 18px;
        font-weight: 700;
      }

      select {
        box-sizing: border-box;
        width: 100%;
        max-width: 280px;
        margin-top: 8px;
        border: 1px solid #3c3c31;
        border-radius: 6px;
        background: #1b1c16;
        color: #fffaf0;
        padding: 11px 12px;
        font: inherit;
      }

      button {
        margin-top: 22px;
        border: 0;
        border-radius: 6px;
        background: #e6c06f;
        color: #17140d;
        font-weight: 800;
        padding: 10px 14px;
        cursor: pointer;
      }

      #status {
        margin-left: 12px;
        color: #9ed6a5;
      }

      .provider-settings {
        margin-top: 18px;
        border: 1px solid #3a3327;
        border-radius: 8px;
        padding: 12px;
        background: #181610;
      }

      .provider-settings h2 {
        margin: 0 0 4px;
        font-size: 15px;
      }

      .provider-settings .hint {
        margin: 0 0 10px;
        font-size: 12px;
        color: #9a9588;
        font-weight: 400;
      }

      .provider-order-list {
        margin-top: 8px;
        user-select: none;
      }

      .provider-order-row {
        display: grid;
        grid-template-columns: 36px 100px 1fr;
        gap: 10px;
        align-items: center;
        margin-top: 8px;
        padding: 10px 10px;
        border: 1px solid #2f2e28;
        border-radius: 8px;
        background: #14130f;
        cursor: grab;
      }

      .provider-order-row:active {
        cursor: grabbing;
      }

      .provider-order-row.dragging {
        opacity: 0.55;
        border-color: #e6c06f;
      }

      .drag-handle {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        letter-spacing: -2px;
        color: #8a8475;
        pointer-events: none;
      }

      .provider-order-row label {
        margin: 0;
        font-weight: 500;
        cursor: pointer;
      }

      .provider-order-row input[type="checkbox"] {
        margin-right: 6px;
        vertical-align: middle;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI Usage Monitor</h1>
      <p>ポップアップに表示するプロバイダーと並び順を設定します。データは拡張内にだけ保存され、外部サーバーへ送りません。</p>

      <label for="autoRefreshMinutes">自動更新の間隔</label>
      <select id="autoRefreshMinutes" aria-describedby="autoRefreshHint"></select>
      <p id="autoRefreshHint" class="hint" style="margin-top: 6px">
        バックグラウンドで各サービスの使用量ページを再読み込みするまでの待ち時間です（1〜120分）。
      </p>

      <section class="provider-settings">
        <h2>ポップアップ表示設定</h2>
        <p class="hint">行をドラッグして上からの表示順を変えられます。「表示する」でポップアップへの表示を切り替えます。</p>
        <div id="providerOrderList" class="provider-order-list">
          <div class="provider-order-row" data-provider="cursor" draggable="true">
            <span class="drag-handle" aria-hidden="true">⠿</span>
            <strong>Cursor</strong>
            <label><input id="showCursor" type="checkbox" checked /> 表示する</label>
          </div>
          <div class="provider-order-row" data-provider="codex" draggable="true">
            <span class="drag-handle" aria-hidden="true">⠿</span>
            <strong>Codex</strong>
            <label><input id="showCodex" type="checkbox" checked /> 表示する</label>
          </div>
          <div class="provider-order-row" data-provider="claude" draggable="true">
            <span class="drag-handle" aria-hidden="true">⠿</span>
            <strong>Claude</strong>
            <label><input id="showClaude" type="checkbox" checked /> 表示する</label>
          </div>
        </div>
      </section>

      <button id="save" type="button">保存</button>
      <span id="status" role="status"></span>
    </main>
    <script src="options.js"></script>
  </body>
</html>
