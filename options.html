<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Usage Monitor Settings</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #11120f;
        color: #f3f0e8;
      }

      body {
        margin: 0;
        padding: 28px;
      }

      main {
        max-width: 680px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        color: #b8b09f;
        line-height: 1.6;
      }

      label {
        display: block;
        margin-top: 18px;
        font-weight: 700;
      }

      input[type="number"] {
        box-sizing: border-box;
        width: 96px;
        margin-top: 8px;
        border: 1px solid #3c3c31;
        border-radius: 6px;
        background: #1b1c16;
        color: #fffaf0;
        padding: 11px 12px;
        font: inherit;
      }

      input[type="text"] {
        box-sizing: border-box;
        width: 100%;
        max-width: 420px;
        margin-top: 8px;
        border: 1px solid #3c3c31;
        border-radius: 6px;
        background: #1b1c16;
        color: #fffaf0;
        padding: 11px 12px;
        font: inherit;
      }

      select {
        box-sizing: border-box;
        min-width: 160px;
        margin-top: 8px;
        border: 1px solid #3c3c31;
        border-radius: 6px;
        background: #1b1c16;
        color: #fffaf0;
        padding: 11px 12px;
        font: inherit;
      }

      .interval-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 14px;
        margin-top: 8px;
      }

      .interval-row .interval-suffix {
        color: #b8b09f;
        font-size: 14px;
      }

      button {
        margin-top: 22px;
        border: 0;
        border-radius: 6px;
        background: #e6c06f;
        color: #17140d;
        font-weight: 800;
        padding: 10px 14px;
        cursor: pointer;
      }

      #status {
        margin-left: 12px;
        color: #9ed6a5;
      }

      .provider-settings {
        margin-top: 18px;
        border: 1px solid #3a3327;
        border-radius: 8px;
        padding: 12px;
        background: #181610;
      }

      .provider-settings h2 {
        margin: 0 0 4px;
        font-size: 15px;
      }

      .provider-settings .hint {
        margin: 0 0 10px;
        font-size: 12px;
        color: #9a9588;
        font-weight: 400;
      }

      .provider-order-list {
        margin-top: 8px;
        user-select: none;
      }

      .provider-order-row {
        display: grid;
        grid-template-columns: 36px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        margin-top: 8px;
        padding: 10px 12px;
        border: 1px solid #2f2e28;
        border-radius: 8px;
        background: #14130f;
        border-left-width: 4px;
        cursor: grab;
      }

      .provider-order-row:active {
        cursor: grabbing;
      }

      .provider-order-row.dragging {
        opacity: 0.55;
        border-color: #e6c06f;
      }

      .provider-order-row.provider-cursor {
        border-left-color: #6ec1ff;
      }

      .provider-order-row.provider-codex {
        border-left-color: #9f8cff;
      }

      .provider-order-row.provider-claude {
        border-left-color: #ffb36c;
      }

      .provider-order-row.provider-devin {
        border-left-color: #5eead4;
      }

      .drag-handle {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        letter-spacing: -2px;
        color: #8a8475;
        pointer-events: none;
      }

      .provider-order-row__main {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .provider-order-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        flex-shrink: 0;
        border-radius: 999px;
        font-size: 11px;
        line-height: 1;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.08);
      }

      .provider-order-icon--codex {
        font-size: 9px;
        letter-spacing: -0.5px;
      }

      .provider-order-icon--devin {
        border-radius: 6px;
        color: #9cf5e8;
      }

      .provider-order-icon--devin svg {
        display: block;
        width: 14px;
        height: 14px;
      }

      .provider-order-row strong {
        font-size: 15px;
        font-weight: 700;
      }

      .provider-order-row label {
        margin: 0;
        font-weight: 500;
        cursor: pointer;
      }

      .provider-order-row input[type="checkbox"] {
        margin-right: 6px;
        vertical-align: middle;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .app-version {
        margin: 28px 0 0;
        padding-top: 16px;
        border-top: 1px solid #2f2e28;
        font-size: 12px;
        color: #8a8475;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 data-i18n="extName">AI Usage Monitor</h1>
      <p data-i18n="options_intro"></p>

      <label for="uiLanguage" data-i18n="options_languageLabel"></label>
      <select id="uiLanguage" aria-describedby="uiLanguageHint">
        <option value="auto" data-i18n="options_languageAuto"></option>
        <option value="en" data-i18n="options_languageEn"></option>
        <option value="ja" data-i18n="options_languageJa"></option>
      </select>
      <p id="uiLanguageHint" class="hint" style="margin-top: 6px" data-i18n="options_languageHint"></p>

      <label for="autoRefreshMinutesInput" data-i18n="options_autoRefreshLabel"></label>
      <div class="interval-row">
        <input
          type="number"
          id="autoRefreshMinutesInput"
          min="1"
          max="120"
          step="1"
          value="1"
          inputmode="numeric"
          aria-describedby="autoRefreshHint"
        />
        <span class="interval-suffix" data-i18n="options_minutesSuffix"></span>
        <select id="autoRefreshPreset" data-i18n="options_autoRefreshPresetAria" data-i18n-attr="aria-label">
          <option value="" data-i18n="options_presetPlaceholder"></option>
        </select>
      </div>
      <p id="autoRefreshHint" class="hint" style="margin-top: 6px" data-i18n="options_autoRefreshHint"></p>

      <section class="provider-settings">
        <h2 data-i18n="options_popupSectionTitle"></h2>
        <p class="hint" data-i18n="options_popupSectionHint"></p>
        <div id="providerOrderList" class="provider-order-list">
          <div class="provider-order-row provider-cursor" data-provider="cursor" draggable="true">
            <span class="drag-handle" aria-hidden="true">⠿</span>
            <div class="provider-order-row__main">
              <span class="provider-order-icon" aria-hidden="true">➤</span>
              <strong>Cursor</strong>
            </div>
            <label><input id="showCursor" type="checkbox" checked /><span data-i18n="options_showLabel"></span></label>
          </div>
          <div class="provider-order-row provider-codex" data-provider="codex" draggable="true">
            <span class="drag-handle" aria-hidden="true">⠿</span>
            <div class="provider-order-row__main">
              <span class="provider-order-icon provider-order-icon--codex" aria-hidden="true">&lt;/&gt;</span>
              <strong>Codex</strong>
            </div>
            <label><input id="showCodex" type="checkbox" checked /><span data-i18n="options_showLabel"></span></label>
          </div>
          <div class="provider-order-row provider-claude" data-provider="claude" draggable="true">
            <span class="drag-handle" aria-hidden="true">⠿</span>
            <div class="provider-order-row__main">
              <span class="provider-order-icon" aria-hidden="true">✶</span>
              <strong>Claude</strong>
            </div>
            <label><input id="showClaude" type="checkbox" checked /><span data-i18n="options_showLabel"></span></label>
          </div>
          <div class="provider-order-row provider-devin" data-provider="devin" draggable="true">
            <span class="drag-handle" aria-hidden="true">⠿</span>
            <div class="provider-order-row__main">
              <span class="provider-order-icon provider-order-icon--devin" aria-hidden="true">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linejoin="round"
                    d="M12 5 18.062 8.5 18.062 15.5 12 19 5.938 15.5 5.938 8.5z"
                  />
                </svg>
              </span>
              <strong>Devin</strong>
            </div>
            <label><input id="showDevin" type="checkbox" /><span data-i18n="options_showLabel"></span></label>
          </div>
        </div>
      </section>

      <label for="devinOrgSlug" data-i18n="options_devinOrgLabel"></label>
      <input
        type="text"
        id="devinOrgSlug"
        autocomplete="off"
        spellcheck="false"
        maxlength="128"
        placeholder="my-org"
        data-i18n="options_devinOrgPlaceholder"
        data-i18n-attr="placeholder"
        aria-describedby="devinOrgHint"
      />
      <p id="devinOrgHint" class="hint" style="margin-top: 6px" data-i18n="options_devinOrgHint"></p>

      <button id="save" type="button" data-i18n="options_save"></button>
      <span id="status" role="status"></span>

      <p id="appVersion" class="app-version" aria-live="polite"></p>
    </main>
    <script src="i18n.js"></script>
    <script src="options.js"></script>
  </body>
</html>
